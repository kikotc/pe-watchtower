<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watchtower — Runbook</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080d18; --surface: #0f1629; --surface2: #131d35;
      --border: #1e2d4a; --border2: #243350;
      --blue: #3b82f6; --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
      --text: #e2e8f0; --muted: #64748b; --faint: #94a3b8;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; line-height: 1.7; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 62px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-title { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; color: #f1f5f9; }
    .logo-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--yellow); background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.25); border-radius: 4px; padding: 3px 8px;
    }
    .btn-back {
      font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none;
      border: 1px solid var(--border2); border-radius: 6px; padding: 6px 14px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-back:hover { color: var(--text); border-color: var(--faint); }

    .page-wrap { max-width: 860px; margin: 0 auto; padding: 40px 32px 80px; }

    /* Markdown rendering styles */
    .md-content h1 { font-size: 32px; font-weight: 800; margin: 0 0 16px; color: #f1f5f9; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .md-content h2 { font-size: 22px; font-weight: 700; margin: 36px 0 14px; color: #f1f5f9; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .md-content h3 { font-size: 17px; font-weight: 600; margin: 24px 0 10px; color: var(--blue); }
    .md-content p { margin: 10px 0; color: var(--text); }
    .md-content ul, .md-content ol { margin: 10px 0; padding-left: 24px; }
    .md-content li { margin: 4px 0; }
    .md-content strong { color: #f1f5f9; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    .md-content code {
      font-family: "SF Mono","Fira Code","Menlo",monospace;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 6px; font-size: 13px; color: var(--blue);
    }
    .md-content pre {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px; margin: 14px 0;
      overflow-x: auto;
    }
    .md-content pre code {
      background: none; border: none; padding: 0; font-size: 13px;
      color: var(--text); line-height: 1.6;
    }

    .md-content table {
      width: 100%; border-collapse: collapse; margin: 14px 0;
      font-size: 14px;
    }
    .md-content th {
      text-align: left; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--faint); font-weight: 600; text-transform: uppercase;
      font-size: 11px; letter-spacing: 0.8px;
    }
    .md-content td {
      padding: 10px 14px; border: 1px solid var(--border);
      color: var(--text);
    }
    .md-content tr:hover td { background: rgba(255,255,255,0.02); }

    .md-content blockquote {
      border-left: 3px solid var(--blue); padding: 8px 16px;
      margin: 14px 0; background: rgba(59,130,246,0.06);
      border-radius: 0 8px 8px 0;
    }

    .md-content a { color: var(--blue); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo-title">Watchtower</span>
      <span class="logo-badge">Runbook</span>
    </div>
    <a href="/dashboard" class="btn-back">Back to Dashboard</a>
  </header>

  <div class="page-wrap">
    <div class="md-content" id="runbook-content"></div>
  </div>

  <script>
    const raw = {{ md_content | tojson }};
    document.getElementById("runbook-content").innerHTML = marked.parse(raw);
  </script>
</body>
</html>
