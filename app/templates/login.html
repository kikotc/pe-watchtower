<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchtower — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080d18;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e2e8f0;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #0f1629;
      border: 1px solid #1e2d4a;
      border-radius: 16px;
      padding: 56px 52px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 13px;
      color: #475569;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="password"] {
      width: 100%;
      background: #0a0e1a;
      border: 1px solid #1e2d4a;
      border-radius: 10px;
      padding: 16px 18px;
      color: #e2e8f0;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    input[type="password"]:focus {
      border-color: #3b82f6;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 17px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.99); }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div>
        <div class="logo-text">Watchtower</div>
        <div class="logo-sub">Admin Console</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter your admin password to continue.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/dashboard/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••" />
      <button type="submit">Access Dashboard →</button>
    </form>
  </div>
</body>
</html>
